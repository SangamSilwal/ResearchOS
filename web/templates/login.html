{% extends "base.html" %}
{% block title %}Log in · ResearchOS{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>Log in</h1>
  <form method="post" action="/login">
    <label>Username
      <input type="text" name="username" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button type="submit">Log in</button>
  </form>
</div>
{% endblock %}
