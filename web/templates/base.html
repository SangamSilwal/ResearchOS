<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ResearchOS{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  {% if show_nav %}
  <header class="topbar">
    <a class="brand" href="/">ResearchOS</a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/settings">Settings</a>
      <a href="/logout">Log out</a>
    </nav>
  </header>
  {% endif %}
  <main class="page">
    {% if error %}<div class="flash flash-error">{{ error }}</div>{% endif %}
    {% if notice %}<div class="flash flash-ok">{{ notice }}</div>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
