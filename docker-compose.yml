services:
  web-search-mcp:
    image: ghcr.io/sangamsilwal/researchos:latest
    command: python -m mcp_servers.web_search.server
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    ports:
      - "8000:8000"
    restart: unless-stopped

  arxiv-mcp:
    image: ghcr.io/sangamsilwal/researchos:latest
    command: python -m mcp_servers.arxiv_mcp.server_arxiv
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8001
    ports:
      - "8001:8001"
    restart: unless-stopped

  researchos:
    image: ghcr.io/sangamsilwal/researchos:latest
    command: sh -c "cd /workspace && python /app/run.py '${TASK:-Build a FastAPI service}'"
    environment:
      MCP_WEB_SEARCH_URL: http://web-search-mcp:8000/mcp
      MCP_ARXIV_URL: http://arxiv-mcp:8001/mcp
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      APP_ENV: docker
    depends_on:
      - web-search-mcp
      - arxiv-mcp
    volumes:
      - ./workspace:/workspace